<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR Tutor: Data Collection & Preparation (Topic 10)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #d4dee8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0A2B38;
            display: inline;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #e1ecf4;
            color: #1c6f9c;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sub {
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-top: 8px;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            background: #FCFDFF;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 86%;
        }

        .user-msg {
            align-self: flex-end;
        }

        .bot-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.4rem;
            font-size: 0.88rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-bubble {
            background: #0F2C3D;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-bubble {
            background: #EFF3F8;
            color: #1f2f3e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .time {
            font-size: 0.6rem;
            color: #8f9eb2;
            margin-top: 5px;
            margin-left: 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.6rem 1rem;
            background: #EFF3F8;
            width: fit-content;
            border-radius: 2rem;
            border-bottom-left-radius: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8a9bb0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.9rem 1.2rem;
            background: white;
            border-top: 1px solid #eef2f7;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .input-area button {
            background: #0F2C3D;
            border: none;
            color: white;
            padding: 0 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .input-area button:hover {
            background: #1f526b;
            transform: scale(0.97);
        }
        .footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px 12px;
            color: #7c8ea0;
            background: #fafcff;
            border-top: 1px solid #edf2f8;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #cbd9e6;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-card { max-width: 100%; border-radius: 1.5rem; }
            .messages { height: 460px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header">
        <h1>Marketing Research AI</h1><span class="badge">Topic 10: Data Collection & Prep</span>
        <div class="sub">📋 Fieldwork • Surveys • Interviewing • Data Processing • Missing Data</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot-msg">
            <div class="bubble bot-bubble">Hi! I'm your marketing research assistant.</div>
            <div class="time">now</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="e.g., What is data collection?" autocomplete="off">
        <button id="send">Send</button>
    </div>
    <div class="footer">📘 answers based on "Topic 10 - Data Collection and Preparation" (fieldwork, survey methods, data preparation)</div>
</div>

<script>
    // Helper function to convert markdown-style **bold** to HTML <strong> tags
    function formatBold(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // Comprehensive knowledge base derived from Topic 10 PDF
    function getDataCollectionAnswer(userQuery) {
        let q = userQuery.toLowerCase().trim();
        
        // --- Data Collection definition ---
        if ((q.includes("data collection") && (q.includes("what is") || q.includes("definition") || q.includes("meaning")))) {
            return formatBold("**Data Collection (Fieldwork)**\n\nThe phase of the marketing research process that involves the actual collection of the required data from the field or necessary sources.\n\nFor a questionnaire survey, real data collection starts after the questionnaire has been pre-tested.\n\n**Fieldwork activities include:** making contact with respondents, administering questionnaires/observation forms, recording data, and preparing usable forms for further processing.");
        }
        
        // --- Methods for Data Collection (3 categories) ---
        if ((q.includes("methods for data collection") || q.includes("data collection methods")) && !q.includes("survey methods")) {
            return formatBold("**Methods for Data Collection (3 Categories)**\n\n1️⃣ **Survey** – Collecting data from sampled respondents to make inferences on population parameters.\n\n2️⃣ **Observation** – Watching and recording behaviors or phenomena.\n\n3️⃣ **Secondary Data** – Using existing data collected for other purposes.\n\nSurvey method is among the most commonly used in marketing research.");
        }
        
        // --- Survey Interviewing Methods ---
        if ((q.includes("survey methods") || q.includes("interviewing methods") || (q.includes("personal interview") && q.includes("telephone")))) {
            return formatBold("**Survey Interviewing Methods**\n\n• **Personal interviews** – Face-to-face\n• **Telephone interviews** – Via phone\n• **Personally administered questionnaire** – Self-completed with researcher present\n• **Mail questionnaire** – Sent and returned via postal service\n• **Electronic questionnaire** – Email, web-based, mobile\n\n**Choice criteria:** speed, quantity of data, flexibility, anonymity, geographical coverage, cost effectiveness, response rate, bias control, use of physical stimuli, effectiveness for sensitive data.");
        }
        
        // --- Criteria for choosing data collection method ---
        if ((q.includes("choice criteria") || q.includes("criteria for choosing") || q.includes("selecting data collection method"))) {
            return formatBold("**Criteria for Choosing Data Collection Methods**\n\n• **Speed** – How quickly data can be collected\n• **Quantity of data** – Amount of information obtainable\n• **Flexibility** – Adaptability during collection\n• **Anonymity** – Protection of respondent identity\n• **Geographical coverage** – Reach across locations\n• **Cost effectiveness** – Budget efficiency\n• **Response rate** – Percentage of completed responses\n• **Respondent/Researcher bias** – Minimizing influence\n• **Use of physical stimuli** – Ability to show products/images\n• **Effectiveness for sensitive data** – Handling personal topics");
        }
        
        // --- Advantages and disadvantages of interviewing methods ---
        if ((q.includes("advantages and disadvantages") && (q.includes("interviewing") || q.includes("survey")))) {
            return formatBold("**Interviewing Methods: General Advantages & Disadvantages**\n\n**Personal interviews:** High response rate, can use visual aids, but expensive and potential interviewer bias.\n\n**Telephone interviews:** Fast, good geographical coverage, but limited questionnaire length, no visual aids.\n\n**Mail surveys:** Low cost, anonymity, but low response rate, no control over who answers.\n\n**Electronic surveys:** Very fast, low cost, but requires internet access, potential sampling bias.\n\n**Personally administered:** High completion rate, clarification possible, but time-consuming, limited reach.");
        }
        
        // --- Managing Data Collection (5 steps: Select, Train, Supervise, Validate, Evaluate) ---
        if ((q.includes("managing data collection") || q.includes("data collection process") || (q.includes("fieldworkers") && q.includes("training")))) {
            return formatBold("**The Data Collection Process (5 Steps)**\n\n1️⃣ **Selecting** – Choose suitable fieldworkers (honest, healthy, sociable, good communication, hardworking, experienced, qualified, pleasant appearance)\n\n2️⃣ **Training** – Train fieldworkers on making initial contact, asking questions, probing, recording answers, terminating interviews\n\n3️⃣ **Supervising** – Monitor quality, sampling control, ethical practices, cost effectiveness, problem rectification\n\n4️⃣ **Validating** – Verify fieldwork tasks, cross-check with randomly sampled respondents\n\n5️⃣ **Evaluating** – Performance appraisal, feedback on cost/time effectiveness, response rate, quality");
        }
        
        // --- Requirements for good fieldworkers ---
        if ((q.includes("fieldworkers") || q.includes("good fieldworkers") || q.includes("qualities of fieldworkers"))) {
            return formatBold("**Requirements for Good Fieldworkers**\n\n• **Honest** – Integrity in data collection\n• **Healthy** – Physically capable\n• **Sociable** – Comfortable interacting with people\n• **Good communication skills** – Clear and effective\n• **Hardworking** – Diligent and persistent\n• **Experienced** – Familiar with research processes\n• **Qualified** – Appropriate background\n• **Pleasant appearance** – Professional presentation");
        }
        
        // --- Interviewer guidelines (CASRO) ---
        if ((q.includes("interviewer guidelines") || q.includes("interviewer should") || q.includes("CASRO"))) {
            return formatBold("**Interviewer Guidelines (Council of American Survey Research Organizations)**\n\n1. Show full name and affiliation before and during interviews\n2. Read each question exactly as written\n3. Read questions in stated sequence\n4. Clarify questions neutrally\n5. Do not mislead or influence respondents\n6. Always remain neutral (no indication of agreement)\n7. Speak slowly and clearly\n8. Record all replies verbatim\n9. Avoid unnecessary conversations\n10. Write answers neatly and accurately\n11. Terminate interview neutrally (e.g., 'Thank you.')\n12. Keep all data strictly confidential");
        }
        
        // --- Probing techniques ---
        if ((q.includes("probing") || q.includes("probe") || q.includes("probing interviewees"))) {
            return formatBold("**Probing in Interviews**\n\nProbing is a technique used by interviewers to go beyond initial responses and obtain more complete, detailed answers.\n\n**When to probe:**\n• When response is incomplete or vague\n• When respondent doesn't understand\n• To clarify ambiguous answers\n• To encourage elaboration\n\n**Probing techniques:**\n• Silent probe (waiting)\n• Repetition of question\n• Neutral clarification\n• 'Anything else?' / 'Can you tell me more about that?'");
        }
        
        // --- Terminating an interview ---
        if ((q.includes("terminate interview") || q.includes("ending interview"))) {
            return formatBold("**Terminating an Interview**\n\nAn interview should be terminated in a neutral way, typically with a simple 'Thank you.'\n\n**Best practices:**\n• Never show frustration or disappointment\n• Maintain professionalism regardless of respondent cooperation\n• Thank respondent for their time\n• Do not pressure or guilt respondents\n\nThis ensures the respondent's goodwill is maintained and protects the researcher's reputation.");
        }
        
        // --- Data Preparation (process steps) ---
        if ((q.includes("data preparation") || (q.includes("prepare data") && !q.includes("analysis")))) {
            return formatBold("**Data Preparation Process**\n\n1️⃣ **Preliminary plan of data analysis**\n2️⃣ **Questionnaire checking** – Verify completeness\n3️⃣ **Editing the data** – Review for accuracy and consistency\n4️⃣ **Coding the data** – Assign numerical codes (use Code Book if necessary)\n5️⃣ **Transcribing or data entry** – Enter into analysis software\n6️⃣ **Data cleaning** – Check consistency, handle missing responses\n7️⃣ **Adjusting data** – Weighting or re-specification if needed\n8️⃣ **Selecting analysis strategy** – Non-statistical or statistical");
        }
        
        // --- Coding data and Code Book ---
        if ((q.includes("coding") || q.includes("code book") || q.includes("coding the data"))) {
            return formatBold("**Coding the Data**\n\nThe process of assigning numerical codes to responses for computer analysis.\n\n**Code Book:** A document that contains:\n• Variable names\n• Variable descriptions\n• Code values for each possible response\n• Column locations\n\n**Example:**\nGender: 1=Male, 2=Female\nSatisfaction: 1=Very dissatisfied to 5=Very satisfied\n\nA well-prepared code book ensures consistency and reduces errors.");
        }
        
        // --- Data cleaning ---
        if ((q.includes("data cleaning") || q.includes("clean data") || q.includes("consistency"))) {
            return formatBold("**Data Cleaning**\n\nThe process of checking data for consistency and handling missing responses.\n\n**Activities include:**\n• Checking for out-of-range values\n• Verifying skip patterns\n• Identifying duplicate records\n• Checking logical consistency (e.g., age = 5, years of work = 20)\n• Handling missing data\n\nData cleaning is essential before any statistical analysis can be performed.");
        }
        
        // --- Missing data treatment (5 strategies) ---
        if ((q.includes("missing data") || q.includes("missing responses") || q.includes("treat missing"))) {
            return formatBold("**Treating Missing Data**\n\nIf missing items are insignificant (<5% of total items), recommended strategies:\n\n1️⃣ **Assign the midpoint** of the item's scale\n2️⃣ **Allow computer to ignore** the blank response (listwise deletion)\n3️⃣ **Mean of the item** from all respondents\n4️⃣ **Mean of related responses** (of that particular respondent) for items measuring the same variable\n5️⃣ **Give a random number** within the range for that scale\n\n**Note:** For significant missing data (>5%), more sophisticated imputation methods may be needed.");
        }
        
        // --- Editing data ---
        if ((q.includes("editing") && q.includes("data"))) {
            return formatBold("**Editing the Data**\n\nThe process of reviewing questionnaires to ensure accuracy and consistency.\n\n**What to check:**\n• Legibility of handwriting\n• Completeness of responses\n• Consistency of answers\n• Appropriate skip patterns followed\n• Unclear or ambiguous responses that need follow-up\n\nEditing can be done in the field or at the office.");
        }
        
        // --- Transcribing / Data entry ---
        if ((q.includes("transcribing") || q.includes("data entry"))) {
            return formatBold("**Transcribing / Data Entry**\n\nThe process of transferring data from questionnaires into a computer file for analysis.\n\n**Methods:**\n• Manual entry into spreadsheet/statistical software\n• Optical scanning (bubble sheets)\n• Online survey platforms (automatic entry)\n\n**Quality control:**\n• Double-entry verification\n• Range checks\n• Random spot-checking\n• Verification of a percentage of entries (e.g., 10-20%)");
        }
        
        // --- Validating fieldwork ---
        if ((q.includes("validating") && q.includes("fieldwork"))) {
            return formatBold("**Validating Fieldwork**\n\nAll fieldwork tasks and activities need to be validated from time to time.\n\n**Validation activities:**\n• Review progress report submissions\n• Verify accuracy and validity of data\n• Cross-check with randomly sampled respondents\n• Confirm interviewers are performing correctly and ethically\n• Ensure proper respondent selection\n\nValidation ensures data integrity and detects any cheating or errors.");
        }
        
        // --- Default fallback ---
        return formatBold("**Topic 10: Data Collection and Preparation**\n\nTry asking about:\n• Data collection definition / fieldwork\n• Methods for data collection (survey, observation, secondary)\n• Survey interviewing methods (personal, telephone, mail, electronic)\n• Criteria for choosing data collection methods\n• Advantages/disadvantages of interviewing methods\n• Managing data collection (5 steps: select, train, supervise, validate, evaluate)\n• Requirements for good fieldworkers\n• Interviewer guidelines (CASRO)\n• Probing techniques\n• Terminating interviews\n• Data preparation process (editing, coding, transcribing, cleaning)\n• Coding and Code Book\n• Data cleaning\n• Treating missing data (5 strategies)\n• Validating fieldwork\n\nJust type your question!");
    }

    // UI elements
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
        const messageWrapper = document.createElement('div');
        messageWrapper.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        const formattedText = text.replace(/\n/g, '<br>');
        messageWrapper.innerHTML = `
            <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${formattedText}</div>
            <div class="time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
        `;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingAndRespond(questionText) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = 'msg bot-msg';
        typingWrapper.id = 'typingMsg';
        typingWrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            const typingElem = document.getElementById('typingMsg');
            if (typingElem) typingElem.remove();
            const answer = getDataCollectionAnswer(questionText);
            addMessage(answer, false);
        }, 420);
    }
    
    function handleSend() {
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        addMessage(rawText, true);
        inputEl.value = '';
        showTypingAndRespond(rawText);
    }
    
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    inputEl.focus();
</script>
</body>
</html>
