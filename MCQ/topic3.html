<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Marketing Research Quiz · Topic 3: Developing an Approach & Literature Review</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f2f5f9;
      padding: 24px 16px;
    }

    .quiz-box {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 24px 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0a2b44;
      text-align: center;
      margin-bottom: 6px;
    }

    .sub {
      text-align: center;
      color: #4a627a;
      font-size: 0.85rem;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e9edf2;
    }

    .question {
      background: #ffffff;
      border: 1px solid #e9edf2;
      border-radius: 20px;
      padding: 18px 22px;
      margin-bottom: 18px;
      transition: all 0.2s;
    }

    .question.correct-bg {
      background: #f0fdf4;
      border-left: 5px solid #22c55e;
    }

    .question.wrong-bg {
      background: #fef2f2;
      border-left: 5px solid #ef4444;
    }

    .q-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .q-num {
      background: #e9edf2;
      padding: 3px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #1a3e60;
    }

    .q-text {
      font-size: 1rem;
      font-weight: 600;
      color: #0f2b3d;
      line-height: 1.5;
      flex: 1;
    }

    .extra-list {
      margin: 10px 0 12px 24px;
      font-size: 0.92rem;
      font-weight: normal;
      color: #2c4c6e;
    }

    .extra-list li {
      margin: 5px 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #fafcff;
      border: 1px solid #e4e9f0;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option:hover {
      background: #f0f5ff;
    }

    input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .feedback {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .feedback-correct {
      background: #dcfce7;
      color: #166534;
      border-left: 3px solid #22c55e;
    }

    .feedback-wrong {
      background: #fee2e2;
      color: #991b1b;
      border-left: 3px solid #ef4444;
    }

    .feedback-missing {
      background: #fff1e6;
      color: #9a3412;
      border-left: 3px solid #f97316;
    }

    .btn-submit {
      background: #1e4a8a;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      margin-top: 12px;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #0f3a6e;
    }

    .btn-submit:disabled {
      background: #9bb5d0;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .score-area {
      text-align: center;
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
      margin-top: 8px;
      border: 1px solid #e9edf2;
    }

    .score-number {
      font-size: 2rem;
      font-weight: 800;
      color: #0a2b44;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .result-icon {
      font-size: 2rem;
    }

    .perfect-badge {
      margin-top: 8px;
      background: linear-gradient(135deg, #f5b042, #f0a500);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
    }

    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #7c8ea0;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="quiz-box">
  <h1>📚 Topic 3: Developing an Approach & Literature Review</h1>
  <div class="sub">Questions 18–37 · research objectives · literature review · variables · citation & references</div>
  <div id="questionsContainer"></div>
  <button id="submitBtn" class="btn-submit">✓ Submit & Grade</button>
  <div id="scorePanel" style="display:none;"></div>
  <footer>Analytical framework · theoretical framework · annotated bibliography · citation rules · marketing excellence</footer>
</div>

<script>
// --------------------------------------------------------------
// QUIZ DATA for TOPIC 3: Developing an Approach & Literature Review
// Questions 18 through 37 exactly as provided from H5P content
// --------------------------------------------------------------
const quizData = [
  // ==== First batch: Q18-Q26 (from previous) ====
  {
    id: 18,
    text: "The right set of information has to be obtained to help the marketing managers to make ____ decisions towards marketing excellence.",
    options: ["A) economic", "B) informed", "C) important", "D) kind"],
    answer: 1,
    listBefore: false,
    listItems: null
  },
  {
    id: 19,
    text: "The 'problem statement' is a long essay which can describe the research problem in detail.",
    options: ["yes", "no"],
    answer: 1,
    listBefore: false
  },
  {
    id: 20,
    text: "Researchable problems most probably are about which ____ among which ____ of which ____ are to be studied.",
    options: [
      "A) variables, measurement, analysis",
      "B) relationships, variables, unit of analysis",
      "C) measurement, variables, case study",
      "D) pilot test, relationships, concept"
    ],
    answer: 1,
    listBefore: false
  },
  {
    id: 21,
    text: "Researcher questions are questions which the researchers will ask the respondents.",
    options: ["yes", "no"],
    answer: 1,
    listBefore: false
  },
  {
    id: 22,
    text: "Which are the following verbs are commonly used to write research objectives?",
    options: [
      "A) know, understand, request, conclude",
      "B) identify, determine, measure, develop, examine",
      "C) count, point-point, identify, propose",
      "D) determine, examine, arrange, reduce"
    ],
    answer: 1,
    listBefore: false
  },
  {
    id: 23,
    text: "Which three Ws are mainly used in research questions?",
    listItems: ["i) What", "ii) Why", "iii) When", "iv) Who", "v) Where", "vi) How"],
    options: ["A) i, ii, iii", "B) iii, iv, v", "C) i, ii, vi", "D) ii, iii, vi"],
    answer: 2,
    listBefore: true
  },
  {
    id: 24,
    text: "Which of the 4 types of variables are commonly used in developing and explaining a theoretical framework in marketing research?",
    listItems: [
      "i) independent variable",
      "ii) dependent variables",
      "iii) statistical variable",
      "iv) moderating variable",
      "v) probability variable",
      "vi) intervening variable"
    ],
    options: ["A) ii, iii, iv, v", "B) i, ii, iv, vi", "C) i, ii, iii, iv", "D) i, iii, iv, v"],
    answer: 1,
    listBefore: true
  },
  {
    id: 25,
    text: "A directional hypothesis can use the following words/symbols in writing the hypothesis:",
    options: [
      "A) Positive, negative, more than, less than, ≤, >",
      "B) Negative, less than, equal to, =",
      "C) Positive, negative, not sure, same, =",
      "D) Positive, negative, more than, less than, ≠"
    ],
    answer: 0,
    listBefore: false
  },
  {
    id: 26,
    text: "The objective of developing a theoretical framework is different from the problem and research objectives and it is not necessarily aligned with the research questions.",
    options: ["A) Correct", "B) Incorrect", "C) Not sure", "D) Up to the researchers"],
    answer: 1,
    listBefore: false
  },
  // ==== Second batch: Q27-Q32 ====
  {
    id: 27,
    text: "A literature review is a list of items and resources with any possible relation to the research topic.",
    options: ["yes", "no"],
    answer: 1,
    listBefore: false
  },
  {
    id: 28,
    text: "Literature review is a ___. It requires the marketing researchers to have critical thinking.",
    options: ["A) sentence", "B) paragraph", "C) critique", "D) component"],
    answer: 2,
    listBefore: false
  },
  {
    id: 29,
    text: "Literature review is important in marketing research EXCEPT",
    options: [
      "A) it helps to identify important variables",
      "B) it helps to design the methodology",
      "C) it mainly uses the primary data",
      "D) it prevents the researcher from reinventing the wheel"
    ],
    answer: 2,
    listBefore: false
  },
  {
    id: 30,
    text: "The researcher needs to follow the steps of literature review to ensure that he/she stays within the scope of the research topic.",
    options: ["A) yes", "B) no", "C) not sure", "D) sometimes only"],
    answer: 0,
    listBefore: false
  },
  {
    id: 31,
    text: "The followings are the negative behaviours of marketing researchers in doing their literature review EXCEPT",
    options: [
      "A) ignoring the seminal work or papers in the field",
      "B) writing the author names wrongly",
      "C) writing a good essay and giving credits to the related authors",
      "D) documenting inaccurate record of material"
    ],
    answer: 2,
    listBefore: false
  },
  {
    id: 32,
    text: "In the process of writing and improving the literature review, making an ___ bibliography will be useful in order to systematically document what has been read from time to time.",
    options: ["A) accredited", "B) annotated", "C) extensive", "D) None of the above"],
    answer: 1,
    listBefore: false
  },
  // ==== Third batch: Q33-Q37 ====
  {
    id: 33,
    text: "Which of the followings are important sources for literature review?",
    listItems: [
      "i. Books",
      "ii. Journals",
      "iii. Stationery",
      "iv. Dissertations",
      "v. Conference proceedings"
    ],
    options: ["A) i, ii, iii, iv", "B) i, ii, iv, v", "C) ii, iii, iv v", "D) i, iii, iv, v"],
    answer: 1,
    listBefore: true
  },
  {
    id: 34,
    text: "A reference has to be included when the ideas or information of other author(s) is/are used in writing the literature review. It is used when the writer is:",
    listItems: [
      "i. paraphrasing based on another author's work",
      "ii. writing the review with his/her own and original ideas",
      "iii. quoting the exact words of another author(s)",
      "iv. summarizing based on literature he/she refers to"
    ],
    options: ["A) i, ii, iii", "B) i, iii, iv", "C) ii, iii, iv", "D) i, ii, iv"],
    answer: 1,
    listBefore: true
  },
  {
    id: 35,
    text: "According to Sekaran and Bougie (2013), when a work is authored by more than 2 authors but less than ___, cite all authors the first time and subsequently include the surname of the first author followed by 'et al.'",
    options: ["A) 4", "B) 5", "C) 6", "D) 7"],
    answer: 2,
    listBefore: false
  },
  {
    id: 36,
    text: "When there is a quotation with more than ___ words, the writer needs to set the paragraph in a free-standing on a new line and indent the left margin with an additional five spaces.",
    options: ["A) 20", "B) 30", "C) 40", "D) 50"],
    answer: 1,
    listBefore: false
  },
  {
    id: 37,
    text: "The process of writing a good literature review is knowledge-enriching for the marketing researchers and they most probably will not miss the important variables for the research of interest.",
    options: ["yes", "no"],
    answer: 0,
    listBefore: false
  }
];

let selections = new Array(quizData.length).fill(-1);
let submitted = false;
let confettiTriggered = false;

const container = document.getElementById("questionsContainer");
const submitBtn = document.getElementById("submitBtn");
const scorePanel = document.getElementById("scorePanel");

// ---------- lightweight confetti celebration (perfect score only) ----------
function startConfetti() {
  if (confettiTriggered) return;
  confettiTriggered = true;

  const colors = ["#f44336", "#e91e63", "#9c27b0", "#3f51b5", "#2196f3", "#00bcd4", "#4caf50", "#ffeb3b", "#ff9800", "#ff5722"];
  const confettiCount = 150;
  const containerEl = document.body;

  for (let i = 0; i < confettiCount; i++) {
    const conf = document.createElement("div");
    const size = Math.floor(Math.random() * 12 + 6);
    const color = colors[Math.floor(Math.random() * colors.length)];
    conf.style.position = "fixed";
    conf.style.width = size + "px";
    conf.style.height = size + "px";
    conf.style.backgroundColor = color;
    conf.style.top = "-20px";
    conf.style.left = Math.random() * window.innerWidth + "px";
    conf.style.opacity = "0.9";
    conf.style.borderRadius = Math.random() > 0.7 ? "50%" : "2px";
    conf.style.pointerEvents = "none";
    conf.style.zIndex = "9999";
    conf.style.boxShadow = "0 2px 5px rgba(0,0,0,0.2)";
    containerEl.appendChild(conf);

    const duration = 1500 + Math.random() * 1500;
    const destination = window.innerHeight + 50;
    const rotate = Math.random() * 360;
    conf.style.transition = `transform ${duration}ms cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity ${duration * 0.8}ms ease-out`;
    requestAnimationFrame(() => {
      conf.style.transform = `translateY(${destination}px) rotate(${rotate}deg)`;
      conf.style.opacity = "0";
    });

    setTimeout(() => {
      if (conf && conf.remove) conf.remove();
    }, duration + 200);
  }

  setTimeout(() => {
    confettiTriggered = false;
  }, 2800);
}

// escape utility
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;'
  }[m] || m));
}

// render all questions with dynamic state
function renderQuestions() {
  let html = "";
  for (let i = 0; i < quizData.length; i++) {
    const q = quizData[i];
    const selectedVal = selections[i];
    let questionClass = "question";

    if (submitted) {
      const isCorrect = (selectedVal !== -1 && selectedVal === q.answer);
      if (isCorrect) {
        questionClass += " correct-bg";
      } else {
        questionClass += " wrong-bg";
      }
    }

    html += `<div class="${questionClass}"><div class="q-header"><span class="q-num">${q.id}</span><div class="q-text">`;

    // Question text + optional list items
    if (q.listBefore && q.listItems && q.listItems.length) {
      html += `<p>${escapeHtml(q.text)}</p><div class="extra-list"><ul>`;
      q.listItems.forEach(li => {
        html += `<li>${escapeHtml(li)}</li>`;
      });
      html += `</ul></div>`;
    } else {
      html += `<div>${escapeHtml(q.text)}</div>`;
    }

    html += `</div></div><div class="options">`;

    // render options
    q.options.forEach((opt, idx) => {
      html += `<label class="option">
        <input type="radio" name="q${i}" value="${idx}" ${selectedVal === idx ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
        <span>${escapeHtml(opt)}</span>
      </label>`;
    });

    html += `</div>`;

    // feedback area after submission
    if (submitted) {
      if (selectedVal === -1) {
        html += `<div class="feedback feedback-missing">⚠️ Not answered · Correct: ${escapeHtml(q.options[q.answer])}</div>`;
      } else if (selectedVal !== q.answer) {
        html += `<div class="feedback feedback-wrong">❌ Incorrect · Your answer: ${escapeHtml(q.options[selectedVal])}<br>✅ Correct: ${escapeHtml(q.options[q.answer])}</div>`;
      } else {
        html += `<div class="feedback feedback-correct">✓ Correct</div>`;
      }
    }
    html += `</div>`; // close .question
  }

  container.innerHTML = html;

  // attach change events only when quiz is not yet submitted
  if (!submitted) {
    for (let i = 0; i < quizData.length; i++) {
      const radios = document.querySelectorAll(`input[name="q${i}"]`);
      radios.forEach(radio => {
        radio.addEventListener("change", (e) => {
          if (!submitted) {
            selections[i] = parseInt(e.target.value);
            renderQuestions(); // re-render to keep UI consistent
          }
        });
      });
    }
  }
}

// compute score (correct answers)
function getScore() {
  let correct = 0;
  for (let i = 0; i < quizData.length; i++) {
    if (selections[i] !== -1 && selections[i] === quizData[i].answer) correct++;
  }
  return correct;
}

// dynamic result icon + label
function getResultIcon(correct, total, isPerfect) {
  const percent = (correct / total) * 100;
  if (isPerfect) return { icon: "👑", label: "PERFECT MASTERY" };
  if (percent >= 80) return { icon: "🏆", label: "EXCELLENT" };
  if (percent >= 60) return { icon: "🎓", label: "GOOD" };
  if (percent >= 50) return { icon: "📘", label: "PASS" };
  return { icon: "📚", label: "NEEDS REVIEW" };
}

// main submit & grading
function handleSubmit() {
  if (submitted) return;

  const answeredCount = selections.filter(s => s !== -1).length;
  if (answeredCount < quizData.length && !confirm(`You answered ${answeredCount} out of ${quizData.length}. Submit anyway?`)) {
    return;
  }

  submitted = true;
  const correct = getScore();
  const total = quizData.length;
  const isPerfect = correct === total;

  // re-render with feedback and background colours
  renderQuestions();

  const percent = (correct / total) * 100;
  let message = isPerfect
    ? "Outstanding! Perfect score achieved! 🌟"
    : percent >= 80
      ? "Excellent! Mastery achieved. 🎉"
      : percent >= 60
        ? "Great job! Review the incorrect answers."
        : percent >= 50
          ? "Pass. Keep practicing to improve."
          : "Needs improvement. Review the questions above.";

  const { icon, label } = getResultIcon(correct, total, isPerfect);

  scorePanel.style.display = "block";
  scorePanel.innerHTML = `
    <div class="score-area">
      <div class="score-number">
        <span class="result-icon">${icon}</span>
        <span>${correct} / ${total}</span>
      </div>
      <div style="margin-top:6px; font-size:0.9rem; font-weight:600; color:#1e4a8a;">${label}</div>
      <div style="margin-top:8px; font-size:0.85rem; color:#2c5a6e;">${message}</div>
      ${isPerfect ? '<div class="perfect-badge">✨ PERFECT SCORE! ✨<br>🎉 Confetti celebration! 🎉</div>' : ''}
    </div>
  `;

  if (isPerfect) {
    startConfetti();
  }

  submitBtn.disabled = true;
}

// initialization
submitBtn.addEventListener("click", handleSubmit);
renderQuestions();
</script>
</body>
</html>
