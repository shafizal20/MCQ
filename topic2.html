<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 2: Defining Problem and Research Objectives</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
  color: #1f2937;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #ffffff;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: #6b7280;
  margin-bottom: 20px;
  font-size: 14px;
}

.question {
  margin-bottom: 20px;
  padding: 18px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  background: #fafafa;
}

label {
  display: block;
  margin: 6px 0;
  cursor: pointer;
}

input {
  margin-right: 8px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.result {
  margin-top: 25px;
  padding: 18px;
  text-align: center;
  font-weight: bold;
  border-radius: 10px;
  display: none;
}

.correct { color: #16a34a; font-weight: 600; }
.wrong { color: #dc2626; font-weight: 600; }
</style>
</head>

<body>

<div class="container">

<h1>Topic 2: Defining Problem and Research Objectives</h1>
<div class="subtitle">Answer all questions before submitting</div>

<form id="quizForm"></form>

<button onclick="submitQuiz()">Submit</button>

<div id="resultBox" class="result"></div>

</div>

<script>

const quizData = [
  {
    question: "11. A/an ____ and ____ identified and defined problem enables research to be properly conducted.",
    options: [
      "nicely, beautifully",
      "clearly, accurately",
      "worldly, theoretically",
      "empirically, economically"
    ],
    answer: 1
  },
  {
    question: "12. A good problem definition avoids unnecessary costs.",
    options: ["Yes", "No"],
    answer: 0
  },
  {
    question: "13. Which is NOT an important task in problem definition?",
    options: [
      "Search literature",
      "Discuss experts",
      "Doing qualitative research",
      "Reporting final research"
    ],
    answer: 3
  }
];

const quizForm = document.getElementById("quizForm");

function loadQuiz() {
  quizForm.innerHTML = "";

  quizData.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";

    let html = `<p><b>${q.question}</b></p>`;

    q.options.forEach((opt, j) => {
      html += `
        <label>
          <input type="radio" name="q${i}" value="${j}">
          ${opt}
        </label>
      `;
    });

    html += `<div id="fb${i}"></div>`;
    div.innerHTML = html;
    quizForm.appendChild(div);
  });
}

function submitQuiz() {
  let score = 0;
  let allAnswered = true;

  quizData.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const fb = document.getElementById(`fb${i}`);

    if (!selected) {
      allAnswered = false;
      fb.innerHTML = `<span class="wrong">Please answer this question</span>`;
    } else {
      if (parseInt(selected.value) === q.answer) {
        score++;
        fb.innerHTML = `<span class="correct">Correct ✓</span>`;
      } else {
        fb.innerHTML = `<span class="wrong">Incorrect ✗</span>`;
      }
    }
  });

  if (!allAnswered) {
    alert("Please answer ALL questions before submitting.");
    return;
  }

  const resultBox = document.getElementById("resultBox");
  resultBox.style.display = "block";

  resultBox.innerHTML =
    `Score: ${score} / ${quizData.length}`;

  // LMS PROGRESS SAVE (Topic 2)
  let completed = JSON.parse(localStorage.getItem("completedTopics")) || [];

  if (!completed.includes("topic2")) {
    completed.push("topic2");
  }

  localStorage.setItem("completedTopics", JSON.stringify(completed));
}

loadQuiz();

</script>

</body>
</html>
