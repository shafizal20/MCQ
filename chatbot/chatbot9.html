<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR Tutor: Marketing Research Proposal (Topic 9)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #d4dee8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0A2B38;
            display: inline;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #e1ecf4;
            color: #1c6f9c;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sub {
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-top: 8px;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            background: #FCFDFF;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 86%;
        }

        .user-msg {
            align-self: flex-end;
        }

        .bot-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.4rem;
            font-size: 0.88rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-bubble {
            background: #0F2C3D;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-bubble {
            background: #EFF3F8;
            color: #1f2f3e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .time {
            font-size: 0.6rem;
            color: #8f9eb2;
            margin-top: 5px;
            margin-left: 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.6rem 1rem;
            background: #EFF3F8;
            width: fit-content;
            border-radius: 2rem;
            border-bottom-left-radius: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8a9bb0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.9rem 1.2rem;
            background: white;
            border-top: 1px solid #eef2f7;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .input-area button {
            background: #0F2C3D;
            border: none;
            color: white;
            padding: 0 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .input-area button:hover {
            background: #1f526b;
            transform: scale(0.97);
        }
        .footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px 12px;
            color: #7c8ea0;
            background: #fafcff;
            border-top: 1px solid #edf2f8;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #cbd9e6;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-card { max-width: 100%; border-radius: 1.5rem; }
            .messages { height: 460px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header">
        <h1>Marketing Research AI</h1><span class="badge">Topic 9: Research Proposal</span>
        <div class="sub">📝 Plan • Guide • Contract • What • Why • How</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot-msg">
            <div class="bubble bot-bubble">Hi! I'm your marketing research assistant.</div>
            <div class="time">now</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="e.g., What is a research proposal?" autocomplete="off">
        <button id="send">Send</button>
    </div>
    <div class="footer">📘 answers based on "Topic 9 - Marketing Research Proposal" (proposal writing principles and format)</div>
</div>

<script>
    // Helper function to convert markdown-style **bold** to HTML <strong> tags
    function formatBold(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // Comprehensive knowledge base derived from Topic 9 PDF
    function getProposalAnswer(userQuery) {
        let q = userQuery.toLowerCase().trim();
        
        // --- What is a research proposal ---
        if ((q.includes("research proposal") && (q.includes("what is") || q.includes("definition") || q.includes("meaning")))) {
            return formatBold("**Marketing Research Proposal**\n\nThe product of a thorough and consistent process of planning and designing the intended marketing research. It is a professionally prepared document that includes the key phases of the entire marketing research process.\n\nA well-written marketing research proposal is instrumental for effective implementation of the desired marketing research as well as generating a good marketing research report.");
        }
        
        // --- Importance/Functions of Research Proposal (4 functions) ---
        if ((q.includes("importance") || q.includes("functions") || q.includes("purpose")) && (q.includes("proposal") || q.includes("research proposal"))) {
            return formatBold("**Importance of a Research Proposal (4 Key Functions)**\n\n1️⃣ **As a Research Plan** – Entails planned strategies and activities, systematic steps, problem definition, objectives, methodology, time schedule, and costing.\n\n2️⃣ **As a Research Guide** – Continuously used to implement planned strategies, reminds researcher of objectives, helps monitor deadlines and costs.\n\n3️⃣ **As an Effective Communication Tool** – Communicates the research purpose and methodology to clients, supervisors, and stakeholders.\n\n4️⃣ **As a Contract** – Serves as an agreement between researcher and client regarding what will be delivered.");
        }
        
        // --- The 3 Wh questions (What, Why, How) ---
        if ((q.includes("what why how") || q.includes("3 wh") || (q.includes("three questions") && q.includes("proposal")))) {
            return formatBold("**The 3 'Wh' Questions in Research Proposal**\n\nA good scientific marketing research proposal addresses three fundamental questions:\n\n❓ **WHAT** – What is this research trying to find out? (Found mainly in the problem statement)\n\n❓ **WHY** – Why is this research necessary? (Addressed in research objectives, research questions, and significance of the study)\n\n❓ **HOW** – How should this research be done? (Explained in research methodology section, schedule, and costing)\n\nFor hypothetical-deductive research, a theoretical/conceptual framework with hypotheses illustrates the 'HOW'.");
        }
        
        // --- Proposal Format (Key Elements) ---
        if ((q.includes("proposal format") || q.includes("components of proposal") || q.includes("elements of proposal") || q.includes("structure of proposal"))) {
            return formatBold("**Marketing Research Proposal Format (Key Elements)**\n\n• Title page\n• Table of contents\n• Introduction\n• Statement of the problem\n• Research questions and objectives\n• Significance of the study\n• Definitions of terms\n• Limitations and delimitations\n• Literature review\n• Theoretical or Conceptual Framework\n• Research design\n• Measurement and instrumentation\n• Sampling technique and sample size\n• Data collection methods and ethical issues\n• Data preparation\n• Data analysis strategy\n• Report presentation format\n• References\n• Appendices (Time schedule/Gantt chart, Budget, Questionnaire)");
        }
        
        // --- Statement of the problem in proposal ---
        if ((q.includes("statement of the problem") || (q.includes("problem statement") && q.includes("proposal")))) {
            return formatBold("**Statement of the Problem in Proposal**\n\nA precious and succinct statement written in one or two paragraphs for most research. After reading it, the reader should know clearly the 'WHAT' and 'WHY' of the research.\n\nTypically covers both management and research dimensions of the problem. Some researchers highlight the problem(s) with critical question(s).");
        }
        
        // --- Research questions and objectives ---
        if ((q.includes("research questions") && q.includes("proposal")) || (q.includes("research objectives") && q.includes("proposal"))) {
            return formatBold("**Research Questions and Objectives in Proposal**\n\nMost researchers use 'what', 'why', and 'how' to write research questions as these provide clear indication of what the research tries to solve or resolve.\n\n**Writing tip:** Use an opening paragraph to describe the issue or purpose, then follow with specific and itemized research questions or objectives.\n\nAlternatively, research objectives tell the reader what is to be achieved in the proposed study.");
        }
        
        // --- Significance of the study ---
        if ((q.includes("significance of the study") || (q.includes("significance") && q.includes("proposal")))) {
            return formatBold("**Significance of the Study**\n\nAddresses the contributions and indirectly the 'WHY' of the proposed study.\n\n**Writing tip:** Put yourself in the reader/client's shoes to logically highlight the benefits and impacts.\n\n**Common approach:** Go by specific stakeholders or beneficiaries such as managers, researchers, governments, academicians.");
        }
        
        // --- Definitions of terms ---
        if ((q.includes("definitions of terms") || (q.includes("definition of terms") && q.includes("proposal")))) {
            return formatBold("**Definitions of Terms in Proposal**\n\nAccurate and commonly used definitions of key terms used in the proposed study should be given with correct referencing.\n\n**Purposes:**\n• Facilitates better understanding of issues and variables to be researched\n• Convinces the reader that the researcher is knowledgeable and competent\n• Establishes credibility");
        }
        
        // --- Limitations vs Delimitations ---
        if ((q.includes("limitations") && q.includes("delimitations")) || (q.includes("limitation") && q.includes("delimitation"))) {
            return formatBold("**Limitations vs Delimitations**\n\n**Limitations** – Unavoidable constraints faced by the researcher, most probably acceptable to readers/clients. NOT 'excuses'. Researcher should convince reader that necessary precautions will be taken to safeguard reliability, validity, and representativeness.\n\n**Delimitations** – Set the limits, scope, or boundaries of the study. Useful to avoid unnecessary misunderstanding, confusion, and potential arguments.");
        }
        
        // --- Literature review in proposal ---
        if ((q.includes("literature review") && q.includes("proposal"))) {
            return formatBold("**Literature Review in Proposal**\n\nThe proposal should appropriately and adequately identify and explain closely related literature (especially theories, models, and measurement aspects) as foundations to the proposed research.\n\n**Purpose:** Enhances the reader's knowledge and enables them to appreciate the study.\n\n**Requirement:** Write-up should be precise and smooth flowing.");
        }
        
        // --- Theoretical/Conceptual Framework in proposal ---
        if ((q.includes("theoretical framework") && q.includes("proposal")) || (q.includes("conceptual framework") && q.includes("proposal"))) {
            return formatBold("**Theoretical/Conceptual Framework in Proposal**\n\nA graphical model crucial for hypothetical-deductive research to effectively communicate variables and relationships to be investigated.\n\n**Structure:**\n1. Introductory paragraph\n2. Schematic diagram (the model)\n3. Systematic paragraphs explaining respective hypotheses/propositions (at least one paragraph per hypothesis with literature citation)\n\nResearchers may use mathematical models with equations for quantitative investigations.");
        }
        
        // --- Research design in proposal ---
        if ((q.includes("research design") && q.includes("proposal"))) {
            return formatBold("**Research Design in Proposal**\n\nThe blueprint of the study should be systematically explained including:\n\n• Types of research design (exploratory or conclusive)\n• Nature of investigation (qualitative/quantitative, contrive/natural setting)\n• Time horizon (cross-sectional or longitudinal)\n• Unit of analysis\n• Measurement and instrument\n• Data collection methods (at different stages if necessary)\n\n**Useful additions:** Flow chart showing steps, operational definitions of variables, sample of tentative questionnaire.");
        }
        
        // --- Sampling in proposal ---
        if ((q.includes("sampling") && q.includes("proposal")) || (q.includes("sample size") && q.includes("proposal"))) {
            return formatBold("**Sampling Technique and Sample Size in Proposal**\n\nThe researcher should demonstrate good understanding and skills in sampling including:\n\n• Explanations on the choice of the best sampling technique and procedures\n• Identification of sampling frame\n• Determination or recommendation of sample size\n\n**Advantage:** A proposal with good sampling technique and tentative size proposed will have an added advantage.");
        }
        
        // --- Data collection, preparation, analysis in proposal ---
        if ((q.includes("data collection") && q.includes("proposal")) || (q.includes("data analysis") && q.includes("proposal"))) {
            return formatBold("**Data Collection, Preparation, and Analysis in Proposal**\n\nA reasonably detailed process should be included to convince the reader that project execution will be professionally and effectively done.\n\n**Key elements:**\n• Data collection procedures\n• Data preparation process (editing, coding, transcription, cleaning)\n• Proposed analysis strategy\n• Indicates the set of information the project can produce");
        }
        
        // --- References in proposal ---
        if ((q.includes("references") && q.includes("proposal")) || (q.includes("reference list") && q.includes("proposal"))) {
            return formatBold("**References in Proposal**\n\nA list of references cited in the proposal.\n\n**Guideline:** Good quality books and international refereed journal articles should be used to enhance credibility.\n\nThis demonstrates the researcher has conducted a thorough literature review and builds on existing knowledge.");
        }
        
        // --- Appendices in proposal (Schedule, Budget, Questionnaire) ---
        if ((q.includes("appendices") || q.includes("gantt chart") || q.includes("time schedule") || q.includes("budget")) && q.includes("proposal")) {
            return formatBold("**Appendices in Research Proposal**\n\nA cutting-edge research proposal should have necessary additional documents in the appendix section:\n\n• Research schedule or Gantt chart\n• Budget\n• Tentative research instruments or questionnaire\n• Map, flow chart, pictures\n• Interview outline\n• Observation form\n\nThese documents support the proposal and demonstrate thorough planning.");
        }
        
        // --- Tips for writing cutting-edge proposal (Title page, Table of Contents, Introduction) ---
        if ((q.includes("tips for writing") || q.includes("cutting-edge proposal") || q.includes("proposal tips"))) {
            return formatBold("**Tips for Writing a Cutting-Edge Proposal**\n\n**Title/Cover Page** – First impression counts! No mistakes. Include name, logo, address, project title. Good binding contributes to perceived quality.\n\n**Table of Contents** – Neatly aligned for quick and precise reference.\n\n**Introduction** – First topic in proposal. Entails background, area of research, context. End with good indication of problem. Strong introduction is crucial to convince reader.\n\n**General principles:** Professional appearance, clear language, logical flow, evidence-based arguments.");
        }
        
        // --- Proposal as contract ---
        if ((q.includes("contract") && q.includes("proposal"))) {
            return formatBold("**Proposal as a Contract**\n\nA research proposal serves as a contract between the researcher and the client/ supervisor.\n\n**What it specifies:**\n• What will be delivered\n• How it will be delivered\n• Timeline for delivery\n• Cost involved\n• Responsibilities of both parties\n\nThis formal agreement helps prevent misunderstandings and sets clear expectations.");
        }
        
        // --- Proposal as communication tool ---
        if ((q.includes("communication tool") && q.includes("proposal"))) {
            return formatBold("**Proposal as a Communication Tool**\n\nThe research proposal is an effective communication tool that:\n\n• Explains the research purpose and methodology to clients\n• Demonstrates the researcher's competence and knowledge\n• Helps secure approval and funding\n• Aligns expectations between researcher and stakeholders\n• Provides a reference point for discussions throughout the project");
        }
        
        // --- Default fallback ---
        return formatBold("**Topic 9: Marketing Research Proposal**\n\nTry asking about:\n• What is a research proposal?\n• Importance/functions of a proposal (plan, guide, communication, contract)\n• The 3 Wh questions (What, Why, How)\n• Proposal format / key elements / components\n• Statement of the problem in proposal\n• Research questions and objectives\n• Significance of the study\n• Definitions of terms\n• Limitations vs delimitations\n• Literature review in proposal\n• Theoretical/conceptual framework\n• Research design in proposal\n• Sampling technique and sample size\n• Data collection, preparation, analysis\n• References\n• Appendices (Gantt chart, budget, questionnaire)\n• Tips for writing a cutting-edge proposal\n\nJust type your question!");
    }

    // UI elements
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
        const messageWrapper = document.createElement('div');
        messageWrapper.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        const formattedText = text.replace(/\n/g, '<br>');
        messageWrapper.innerHTML = `
            <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${formattedText}</div>
            <div class="time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
        `;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingAndRespond(questionText) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = 'msg bot-msg';
        typingWrapper.id = 'typingMsg';
        typingWrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            const typingElem = document.getElementById('typingMsg');
            if (typingElem) typingElem.remove();
            const answer = getProposalAnswer(questionText);
            addMessage(answer, false);
        }, 420);
    }
    
    function handleSend() {
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        addMessage(rawText, true);
        inputEl.value = '';
        showTypingAndRespond(rawText);
    }
    
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    inputEl.focus();
</script>
</body>
</html>
