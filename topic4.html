<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 4 Quiz</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h1 {
  text-align: center;
}

.question {
  margin-bottom: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 10px;
}

.question img {
  max-width: 100%;
  margin: 10px 0;
  border-radius: 8px;
}

label {
  display: block;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
<h1>Topic 4: Research Design</h1>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit</button>

<div id="result" class="result"></div>
</div>

<script>
const quizData = [
  {
    q: "38. The research design is like a blueprint and it describes the entire framework or plan for a research project.",
    options: ["Yes", "No"],
    answer: 0
  },
  {
    q: "39. The characteristics of qualitative research.",
    options: ["Quantitative", "Qualitative", "Empirical", "Hypothetical"],
    answer: 1
  },
  {
    q: "40. Quantitative research is more statistical in nature.",
    options: ["Yes", "No"],
    answer: 0
  },
  {
    q: "41. The above are characteristics of ____ data.",
    options: ["Secondary", "Tertiary", "Primary"],
    answer: 2
  },
  {
    q: "42. Which is NOT the disadvantage of longitudinal research?",
    options: [
      "Time consuming",
      "Need cooperation",
      "Repeated data more reliable",
      "Expensive"
    ],
    answer: 2
  },
  {
    q: "43. The depth interview has the following advantages EXCEPT:",
    options: ["Depth insight", "Better than focus group", "Direct responses", "Free exchange"],
    answer: 1
  },
  {
    q: "44. Which link for categorization of research design is NOT true?",
    image: "https://raw.githubusercontent.com/shafizal20/MCQ/main/question44.png",
    options: ["A", "B", "C", "D"],
    answer: 1
  },
  {
    q: "45. Descriptive research usually answers the 6 Ws questions.",
    options: ["Yes", "No"],
    answer: 0
  },
  {
    q: "46. Causal research includes the followings EXCEPT:",
    options: ["Experiment", "Cause-effect", "Manipulation", "Cross-sectional descriptive"],
    answer: 3
  },
  {
    q: "47. The advantages of Focus Groups EXCEPT:",
    options: ["Speed", "Synergy", "Structure", "Size"],
    answer: 3
  },
  {
    q: "48. Conditions for causality include logical time sequence, ____ and control.",
    options: ["Commitment", "Concomitant variation", "Measurement", "Co-creation"],
    answer: 1
  },
  {
    q: "49. Which is NOT a projective technique?",
    options: ["Word association", "Sentence completion", "Projection", "Construction"],
    answer: 2
  }
];

const quiz = document.getElementById("quiz");

quizData.forEach((item, i) => {
  let html = `<div class="question">
    <p>${item.q}</p>`;

  if (item.image) {
    html += `<img src="${item.image}" alt="question image">`;
  }

  item.options.forEach((opt, j) => {
    html += `
      <label>
        <input type="radio" name="q${i}" value="${j}">
        ${opt}
      </label>
    `;
  });

  html += `</div>`;
  quiz.innerHTML += html;
});

function submitQuiz() {
  let score = 0;

  quizData.forEach((item, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected && parseInt(selected.value) === item.answer) {
      score++;
    }
  });

  document.getElementById("result").innerText =
    `Your Score: ${score} / ${quizData.length}`;
}
</script>

</body>
</html>
