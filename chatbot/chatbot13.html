<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR Tutor: Communicating Research Findings (Topic 13)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #d4dee8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0A2B38;
            display: inline;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #e1ecf4;
            color: #1c6f9c;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sub {
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-top: 8px;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            background: #FCFDFF;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 86%;
        }

        .user-msg {
            align-self: flex-end;
        }

        .bot-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.4rem;
            font-size: 0.88rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-bubble {
            background: #0F2C3D;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-bubble {
            background: #EFF3F8;
            color: #1f2f3e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .time {
            font-size: 0.6rem;
            color: #8f9eb2;
            margin-top: 5px;
            margin-left: 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.6rem 1rem;
            background: #EFF3F8;
            width: fit-content;
            border-radius: 2rem;
            border-bottom-left-radius: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8a9bb0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.9rem 1.2rem;
            background: white;
            border-top: 1px solid #eef2f7;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .input-area button {
            background: #0F2C3D;
            border: none;
            color: white;
            padding: 0 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .input-area button:hover {
            background: #1f526b;
            transform: scale(0.97);
        }
        .footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px 12px;
            color: #7c8ea0;
            background: #fafcff;
            border-top: 1px solid #edf2f8;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #cbd9e6;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-card { max-width: 100%; border-radius: 1.5rem; }
            .messages { height: 460px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header">
        <h1>Marketing Research AI</h1><span class="badge">Topic 13: Communicating Findings</span>
        <div class="sub">📄 Research Report • Executive Summary • Oral Presentation • Principles</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot-msg">
            <div class="bubble bot-bubble">Hi! I'm your marketing research assistant.</div>
            <div class="time">now</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="e.g., What is executive summary?" autocomplete="off">
        <button id="send">Send</button>
    </div>
    <div class="footer">📘 answers based on "Topic 13 - Communicating Research Findings" (report writing & oral presentation)</div>
</div>

<script>
    // Helper function to convert markdown-style **bold** to HTML <strong> tags
    function formatBold(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // Comprehensive knowledge base derived from Topic 13 PDF
    function getCommunicationAnswer(userQuery) {
        let q = userQuery.toLowerCase().trim();
        
        // --- Importance of report and presentation ---
        if ((q.includes("importance") || q.includes("why")) && (q.includes("report") || q.includes("presentation")) && !q.includes("executive")) {
            return formatBold("**Importance of Research Report and Presentation (4 Reasons)**\n\n1️⃣ **Historical Record** – Tangible proof of work done; reference for future research.\n\n2️⃣ **Guide Management Decisions** – Helps management understand the problem and make better decisions. Poor reporting can lead to organizational losses.\n\n3️⃣ **Quality Evaluation** – Managers evaluate the entire project based on report and presentation quality.\n\n4️⃣ **Research Service** – Determines whether clients will use the researcher's services again.\n\n**Key point:** An impressive report with a poor presentation (or vice versa) will not provide maximum satisfaction.");
        }
        
        // --- Report Format / Structure (3 Parts) ---
        if ((q.includes("report format") || q.includes("structure of report") || q.includes("parts of report"))) {
            return formatBold("**Research Report Structure (3 Parts)**\n\n**PART I – Preliminary Pages**\n• Title page • Acknowledgements • Letter of transmittal • Letter of authorization • Table of contents • List of tables/graphs/appendices/exhibits • Executive Summary\n\n**PART II – Contents (5 Chapters)**\nChapter 1: Introduction (problem, objectives, significance)\nChapter 2: Literature Review & Theoretical Framework\nChapter 3: Research Methodology\nChapter 4: Data Analysis & Findings\nChapter 5: Conclusions & Recommendations\n\n**PART III – References & Appendices**\n• List of references • Sample questionnaire • Pictures, forms");
        }
        
        // --- Executive Summary ---
        if ((q.includes("executive summary") || (q.includes("summary") && q.includes("report")))) {
            return formatBold("**Executive Summary**\n\nA concise overview of the entire research report, placed in the preliminary pages.\n\n**Must include:**\n• Major findings\n• Conclusions\n• Recommendations\n\n**Length:** About 5 pages (ideal)\n\n**Purpose:** Helps busy managers obtain a comprehensive explanation of overall findings without reading the whole report.\n\n**Important:** No new material should be added – only summarize what is in the report.");
        }
        
        // --- Preliminary Pages elements ---
        if ((q.includes("preliminary pages") || q.includes("title page") || q.includes("table of contents") || q.includes("letter of transmittal"))) {
            return formatBold("**Preliminary Pages Elements**\n\n• **Title Page** – Study title, researcher name/address, recipient name, release date\n• **Acknowledgements** – Recognize parties who contributed to the research\n• **Letter of Transmittal** – Formally inform submission of report\n• **Letter of Authorization** – Gain approval from sponsors\n• **Table of Contents** – List of contents with page numbers\n• **List of Tables/Graphs/Appendices/Exhibits** – Help audience find references\n• **Executive Summary** – Major findings, conclusions, recommendations\n\nThese front pages create the first impression – they must be professionally done!");
        }
        
        // --- Chapter 1: Introduction ---
        if ((q.includes("chapter 1") || (q.includes("introduction") && q.includes("report"))) && !q.includes("executive")) {
            return formatBold("**Chapter 1: Introduction**\n\nKey components:\n\n• **Problem Definition** – Identify and define the problem\n• **Problem Statement** – Clear statement of the issue\n• **Research Questions** – What the research seeks to answer\n• **Research Objectives** – What the research aims to achieve\n• **Significance of the Study** – Importance and contribution\n• **Definition of Terms** – Key terms with literature citations\n• **Scope of the Study** – Boundaries of the research\n• **Limitations** – Unavoidable constraints\n\nClear objectives serve as a measure of successful research completion.");
        }
        
        // --- Chapter 2: Literature Review ---
        if ((q.includes("chapter 2") || (q.includes("literature review") && q.includes("report")))) {
            return formatBold("**Chapter 2: Literature Review**\n\nContents:\n\n• **Theoretical background** of the problem area\n• **Related literature** – Prior studies and findings\n• **Proper reasoning** supported by prior research\n• **Theoretical/Conceptual Framework** – Graphical model showing variables and relationships\n• **Hypotheses** – Testable propositions derived from the framework\n\nVariables, their roles, and relationships among variables are explained with relevant literature citations.");
        }
        
        // --- Chapter 3: Research Methodology ---
        if ((q.includes("chapter 3") || (q.includes("methodology") && q.includes("report")))) {
            return formatBold("**Chapter 3: Research Methodology**\n\nComponents:\n\n• **Research Design** – Exploratory, descriptive, or causal\n• **Time Horizon** – Cross-sectional or longitudinal\n• **Unit of Analysis** – Individual, dyad, group, organization\n• **Measurement** – Scales and operational definitions\n• **Instrumentation** – Development or sources of measurement\n• **Sampling** – Technique, frame, and sample size\n• **Data Collection** – Methods and procedures\n• **Data Preparation** – Editing, coding, cleaning\n• **Data Analysis Strategies** – Statistical techniques to be used\n\nThis chapter informs readers HOW the research was conducted.");
        }
        
        // --- Chapter 4: Data Analysis and Findings ---
        if ((q.includes("chapter 4") || (q.includes("findings") && q.includes("chapter")))) {
            return formatBold("**Chapter 4: Data Analysis and Findings**\n\nThe integral part of the report where results are revealed and interpreted.\n\n**Contents:**\n• Results of statistical analyses\n• Findings from the data\n• Interpretations of findings\n• Discussions in relation to theories and past research\n\n**Presentation tools:** Tables, charts, graphs\n\n**Software examples:** SPSS, AMOS, SmartPLS\n\nFindings should be properly and meaningfully interpreted to yield interesting insights.");
        }
        
        // --- Chapter 5: Conclusions and Recommendations ---
        if ((q.includes("chapter 5") || (q.includes("conclusions") && q.includes("recommendations")))) {
            return formatBold("**Chapter 5: Conclusions and Recommendations**\n\nThe final chapter of the report.\n\n**Conclusions:**\n• Based on research objectives\n• Discuss findings in support of or against previous research\n• Writer's biases and desires should NOT influence conclusions\n\n**Recommendations:**\n• Practical suggestions for decision makers\n• How to address the problem\n• Strategic actions to overcome the problem\n\n**Future Research:** Directions for subsequent studies");
        }
        
        // --- Principles of Report Writing (6 principles) ---
        if ((q.includes("principles of report writing") || q.includes("report writing principles"))) {
            return formatBold("**Principles of Report Writing (6 Criteria)**\n\n1️⃣ **Audience** – Write with particular audiences in mind. Busy managers focus on executive summary.\n\n2️⃣ **Clarity** – Without clarity, report is meaningless. Unclear reports can lead to wrong decisions.\n\n3️⃣ **Simplicity** – Use simple but comprehensive language. Avoid jargon. Quality over length.\n\n4️⃣ **Organized** – Sequential format showing research direction. Use tables/graphs. Professional appearance.\n\n5️⃣ **Tenses** – Consistent usage: past tense for past records, present tense for general truth or referring to tables.\n\n6️⃣ **Check** – Read and re-check by others to avoid mistakes and ensure intended meaning.");
        }
        
        // --- Oral Presentation importance and timing ---
        if ((q.includes("oral presentation") && (q.includes("importance") || q.includes("timing") || q.includes("duration")))) {
            return formatBold("**Oral Presentation**\n\n**Duration:** 20-30 minutes (enough to cover important findings)\n\n**Why important:**\n• Highlights results of the lengthy report\n• Keeps audience attentive while delivering accurate facts\n• Great ideas have no value unless communicated well\n\n**What is graded:**\n• **Content** – Quality, logical flow, appropriateness, no mistakes\n• **Delivery** – Audience attentiveness, visual aids clarity, appearance, persuasiveness, body language\n\n**Warning:** A poor presentation can cause a well-researched project to be perceived as poorly done.");
        }
        
        // --- Principles of Oral Presentation (7 principles) ---
        if ((q.includes("oral presentation principles") || q.includes("principles of oral presentation") || q.includes("presentation guidelines"))) {
            return formatBold("**Principles of Oral Presentation (7 Guidelines)**\n\n1️⃣ **Preparation** – Plan what to say, when to speak, how to use visual aids. Always have a backup plan.\n\n2️⃣ **Organizing Content** – Introduce yourself, provide clear outline. KISS (Keep It Short and Simple).\n\n3️⃣ **Voice** – Clear projection, no shouting. Voice variation for important points. Control speed.\n\n4️⃣ **Body Language** – Positive posture shows confidence. Eye contact is extremely important.\n\n5️⃣ **Language** – Explain technical terms if used. Avoid filler words. Use simple language.\n\n6️⃣ **Time Management** – Allocate time per topic (e.g., 5 min problem, 5 min lit review, 5 min methodology, 10 min findings, 5 min Q&A).\n\n7️⃣ **Visual Aids** – Tables and graphs help listeners see the whole picture and make quick comparisons.");
        }
        
        // --- Body Language in presentation ---
        if ((q.includes("body language") && q.includes("presentation"))) {
            return formatBold("**Body Language in Oral Presentation**\n\nBody language speaks louder than words.\n\n**Types of gestures:**\n• **Descriptive gestures** – Clarify or enhance verbal communication\n• **Emphatic gestures** – Emphasize what has been said\n• **Prompting gestures** – Elicit desired response from audience\n\n**Key elements:**\n• Positive posture = Confidence\n• Good eye contact = Persuasion, gains continual commitment\n• Sense of humor = Keeps boredom away\n\nEye contact is one of the best ways to persuade the audience.");
        }
        
        // --- Voice projection ---
        if ((q.includes("voice") && q.includes("presentation"))) {
            return formatBold("**Voice in Oral Presentation**\n\n**Guidelines:**\n• Project clearly – no shouting\n• If using microphone, control volume (no need to speak loudly)\n• Use voice variation to stress important points\n• Control speed – speaking too fast with repeated words shows nervousness\n\n**Warning:** Audiences psychologically 'reject' presentations with monotonous voice as if reading from text.");
        }
        
        // --- Visual aids ---
        if ((q.includes("visual aids") && q.includes("presentation"))) {
            return formatBold("**Visual Aids in Oral Presentation**\n\n**Purpose:** Facilitate good understanding, especially for marketing practitioners.\n\n**Recommended:** Tables and graphs\n\n**Benefits:**\n• Help listeners see the whole picture\n• Enable quick comparisons and evaluations\n• Avoids audience having to evaluate results themselves during the short presentation\n\n**Preparation tip:** Have a backup plan if technology fails (e.g., handouts or transparencies).");
        }
        
        // --- Time allocation for presentation ---
        if ((q.includes("time allocation") || (q.includes("presentation") && q.includes("minutes")))) {
            return formatBold("**Time Allocation for 30-Minute Presentation**\n\n• Problem statement, research questions/objectives – **5 minutes**\n• Literature review and research model – **5 minutes**\n• Methodology – **5 minutes**\n• Findings and conclusions – **10 minutes**\n• Questions and answers – **5 minutes**\n\nManaging time prevents audience distraction and avoids unnecessary content.");
        }
        
        // --- References and Appendices ---
        if ((q.includes("references") || q.includes("appendices")) && (q.includes("report") || q.includes("part iii"))) {
            return formatBold("**Part III: References & Appendices**\n\n**References:**\n• List of all sources cited in the report\n• Use common formats: APA or Harvard system\n• Includes journals, periodicals, books, articles\n\n**Appendices:**\n• Sample questionnaire\n• Pictures\n• Forms\n• Other supporting documents for reader reference\n\nMany have problems writing references using the correct format according to source types.");
        }
        
        // --- Difference between written report and oral presentation ---
        if ((q.includes("difference") && (q.includes("written") && q.includes("oral"))) || (q.includes("report vs presentation"))) {
            return formatBold("**Written Report vs Oral Presentation**\n\n**Written Report:**\n• More detailed in nature\n• Reports research process and findings with discussions\n• Serves as historical record\n\n**Oral Presentation:**\n• More straightforward\n• Stresses providing information that reveals what audience wants to know\n• Highlights results of lengthy report\n\nBoth are important – an impressive report with a poor presentation (or vice versa) will not provide maximum satisfaction.");
        }
        
        // --- Q&A session ---
        if ((q.includes("question and answer") || q.includes("q&a") || q.includes("answering questions"))) {
            return formatBold("**Question and Answer Session**\n\n**Guidelines:**\n• Control your emotions – some questions may sound irrelevant or challenging\n• Keep calm\n• Answer questions based on results and findings\n• A good presentation limits the need for audience questions (presented well and clear)\n\n**Remember:** Great ideas have no value unless they are communicated well to the audience.");
        }
        
        // --- Default fallback ---
        return formatBold("**Topic 13: Communicating Research Findings**\n\nTry asking about:\n• Importance of research report and presentation (4 reasons)\n• Report format / structure (3 parts: preliminary, contents, references)\n• Executive summary (purpose, length, contents)\n• Preliminary pages elements\n• Chapter 1: Introduction (problem, objectives, significance)\n• Chapter 2: Literature Review & framework\n• Chapter 3: Research Methodology\n• Chapter 4: Data Analysis & Findings\n• Chapter 5: Conclusions & Recommendations\n• Principles of report writing (6 criteria: audience, clarity, simplicity, organized, tenses, check)\n• Oral presentation (duration, importance, what is graded)\n• Principles of oral presentation (7 guidelines: preparation, organizing, voice, body language, language, time management, visual aids)\n• Body language and eye contact\n• Visual aids and backup plans\n• Time allocation for presentation\n• Q&A session\n\nJust type your question!");
    }

    // UI elements
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
        const messageWrapper = document.createElement('div');
        messageWrapper.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        const formattedText = text.replace(/\n/g, '<br>');
        messageWrapper.innerHTML = `
            <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${formattedText}</div>
            <div class="time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
        `;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingAndRespond(questionText) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = 'msg bot-msg';
        typingWrapper.id = 'typingMsg';
        typingWrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            const typingElem = document.getElementById('typingMsg');
            if (typingElem) typingElem.remove();
            const answer = getCommunicationAnswer(questionText);
            addMessage(answer, false);
        }, 420);
    }
    
    function handleSend() {
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        addMessage(rawText, true);
        inputEl.value = '';
        showTypingAndRespond(rawText);
    }
    
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    inputEl.focus();
</script>
</body>
</html>
