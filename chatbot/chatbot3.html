<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR Tutor: Developing Approach & Lit Review (Topic 3)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #d4dee8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0A2B38;
            display: inline;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #e1ecf4;
            color: #1c6f9c;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sub {
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-top: 8px;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            background: #FCFDFF;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 86%;
        }

        .user-msg {
            align-self: flex-end;
        }

        .bot-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.4rem;
            font-size: 0.88rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-bubble {
            background: #0F2C3D;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-bubble {
            background: #EFF3F8;
            color: #1f2f3e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .time {
            font-size: 0.6rem;
            color: #8f9eb2;
            margin-top: 5px;
            margin-left: 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.6rem 1rem;
            background: #EFF3F8;
            width: fit-content;
            border-radius: 2rem;
            border-bottom-left-radius: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8a9bb0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.9rem 1.2rem;
            background: white;
            border-top: 1px solid #eef2f7;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .input-area button {
            background: #0F2C3D;
            border: none;
            color: white;
            padding: 0 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .input-area button:hover {
            background: #1f526b;
            transform: scale(0.97);
        }
        .footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px 12px;
            color: #7c8ea0;
            background: #fafcff;
            border-top: 1px solid #edf2f8;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #cbd9e6;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-card { max-width: 100%; border-radius: 1.5rem; }
            .messages { height: 460px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header">
        <h1>Marketing Research AI</h1><span class="badge">Topic 3: Approach & Lit Review</span>
        <div class="sub">📚 Problem statement • Research questions • Framework • Literature review</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot-msg">
            <div class="bubble bot-bubble">Hi! I'm your marketing research assistant.</div>
            <div class="time">now</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="e.g., What is a problem statement?" autocomplete="off">
        <button id="send">Send</button>
    </div>
    <div class="footer">📘 answers based on "Topic 3 - Developing the Approach to the Problem and Literature Review"</div>
</div>

<script>
    // Helper function to convert markdown-style **bold** to HTML <strong> tags
    function formatBold(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // Comprehensive knowledge base derived from Topic 3 PDF (with proper HTML bold formatting)
    function getTopic3Answer(userQuery) {
        let q = userQuery.toLowerCase().trim();
        
        // --- Problem Statement ---
        if ((q.includes("problem statement") || q.includes("what is a problem statement")) && !q.includes("research objectives")) {
            return formatBold("**Problem Statement**\n\nThe output of the problem definition process. A few sentences precisely highlighting the problematic issue(s) to be investigated. It clearly indicates what the research is about and why it's done.\n\n**Four types of problem statements:**\n1. Existing problem needing a solution\n2. Situation with opportunities to tap\n3. Area needing conceptual clarity\n4. Situation requiring empirical investigation\n\n**Example:** 'Grace Hospital is experiencing increasing patient complaints despite a service improvement programme. Management needs information on programme effectiveness and impact on patient satisfaction and loyalty.'");
        }
        
        // --- Research Questions ---
        if ((q.includes("research questions") || q.includes("research question")) && !q.includes("objectives")) {
            return formatBold("**Research Questions**\n\nRefined statements of specific components of the problem. They ask what specific information is required.\n\n**Key question starters:**\n• What...?\n• Why...?\n• How...?\n\n**Example from Grace Hospital:**\n1. What are the dimensions of hospital service quality from the patient's perspective?\n2. How does patient-perceived service quality affect patient satisfaction and loyalty?");
        }
        
        // --- Research Objectives ---
        if ((q.includes("research objectives") || q.includes("research objective") || q.includes("objectives of research"))) {
            return formatBold("**Research Objectives**\n\nServe as a 'lighthouse' guiding the researcher throughout the project.\n\n**Three broad purposes of research:**\n1. **To Explore** – become familiar with a phenomenon, gain insights\n2. **To Describe** – describe phenomenon/variables as complete and precise as possible\n3. **To Examine/Test** – examine and test relationships between/among variables\n\n**Example from Grace Hospital:**\n• To identify the dimensions of hospital service quality\n• To examine the effects of hospital service quality on patient satisfaction and loyalty");
        }
        
        // --- Variables (types: independent, dependent, moderating, intervening) ---
        if ((q.includes("independent variable") || q.includes("dependent variable") || q.includes("moderating variable") || q.includes("intervening variable") || q.includes("types of variables")) && (q.includes("variable") || q.includes("variables"))) {
            return formatBold("**Four Types of Variables in Theoretical Framework**\n\n🔹 **Independent Variable (Predictor)** – influences the dependent variable positively or negatively.\n\n🔹 **Dependent Variable (Criterion)** – variable of primary interest; its value depends on independent variable(s).\n\n🔹 **Moderating Variable** – exerts contingent effect on the relationship between independent and dependent variables (enhances or weakens).\n\n🔹 **Intervening Variable** – exerts influence across time between the independent variable's effect and its completion.\n\n**Example:** Patient loyalty (dependent) is affected by service quality (independent). Patient demographics (moderating) change this effect. Patient satisfaction (intervening) can change the original relationship over time.");
        }
        
        // --- Hypotheses ---
        if ((q.includes("hypothesis") || q.includes("hypotheses") || q.includes("null hypothesis") || q.includes("alternative hypothesis") || q.includes("directional") || q.includes("non-directional"))) {
            return formatBold("**Hypotheses**\n\nA hypothesis is a **declarative statement that is testable** – a specified relationship between two or more variables expressed in statistically testable form.\n\n**Null Hypothesis (H₀):** 'no', 'the same', 'equals to', 'less than or equal to', 'greater than or equal to'\n**Alternative Hypothesis (Hₐ):** Opposite of the null\n\n**Formats:**\n• If-Then statements: 'If service quality is high, then patients will be loyal'\n• Directional: positive/negative, more than/less than\n• Non-directional: 'There is a relationship'\n\n**Example:** H₁₀: No relationship between service quality and patient satisfaction. H₁ₐ: Significant relationship exists.");
        }
        
        // --- Theoretical Framework ---
        if ((q.includes("theoretical framework") || q.includes("conceptual framework") || q.includes("schematic diagram"))) {
            return formatBold("**Theoretical Framework**\n\nA schematic diagram illustrating the variables involved in the study and their relationships. Developed from a good literature review.\n\n**Components:**\n• Identifies independent, dependent, moderating, and intervening variables\n• Shows logical relationships between variables\n• Provides foundation for hypothesis development\n\nExample: Service Quality → Patient Satisfaction → Patient Loyalty, with Patient Demography as moderating variable.");
        }
        
        // --- Literature Review (general) ---
        if ((q.includes("literature review") && (q.includes("what is") || q.includes("definition") || q.includes("meaning"))) || (q.includes("lit review") && !q.includes("process") && !q.includes("need"))) {
            return formatBold("**Literature Review**\n\nA report of a comprehensive review of published and unpublished work in areas of specific interest to the researcher.\n\n**Key sources:** books, refereed journal articles, quality research reports, postgraduate dissertations/theses, published conference proceedings, monographs.\n\n**Important:** A literature review is NOT merely a list of items. It is a **critique** focused on resources directly relevant to the research topic, and is highly selective.");
        }
        
        // --- Need for Literature Review (6 reasons) ---
        if ((q.includes("need for literature review") || q.includes("why literature review") || q.includes("importance of literature review") || q.includes("reasons for literature review"))) {
            return formatBold("**Why a Literature Review is Needed** (6 reasons):\n\n1️⃣ **Avoid ignoring critical variables** – ensures no important variables are overlooked\n2️⃣ **Highlight important variables** – especially from landmark journal articles\n3️⃣ **Help design methodology** – provides useful tips for data collection techniques\n4️⃣ **Prevent reinventing the wheel** – saves time by knowing what's already researched\n5️⃣ **Basis of qualitative research** – demonstrates systematic process and projections\n6️⃣ **Facilitates creative integration** – provides blueprint/framework for developing theoretical framework and hypotheses");
        }
        
        // --- Requirements for Good Literature Review (7 points) ---
        if ((q.includes("good literature review") || q.includes("requirements for literature review") || q.includes("qualities of literature review"))) {
            return formatBold("**Requirements for a Good Literature Review**:\n\n1. **Inclusion of important variables** – no key factors left out\n2. **Emergence of clear idea** – what variables matter, why and how\n3. **Problem refinement** – problem statement formulated with precision and clarity\n4. **Discovery of new problems/variables** – avoid reinventing the wheel\n5. **Testability & replicability enhancement** – identifies variables and relates theory to application\n6. **Perceived as scientific** – relevant, significant, evidence-based\n7. **Knowledge enhancement** – teaches researcher and readers\n\n**Dos:** Identify landmark studies, use up-to-date material, be critical and analytical.\n**Don'ts:** Omit seminal work, discuss outdated material, produce a mere list, accept everything at face value.");
        }
        
        // --- Literature Review Process (7 steps) ---
        if ((q.includes("literature review process") || q.includes("steps in literature review") || q.includes("how to do literature review"))) {
            return formatBold("**Literature Review Process** (7 steps):\n\n1️⃣ **Identify a working topic** – focus on specific area of study\n2️⃣ **Review related literature** – use keywords, search databases, browse reference lists\n3️⃣ **Focus on specific topics** – select truly relevant journal articles\n4️⃣ **Read articles and evaluate** – understand methodology, findings, conclusions\n5️⃣ **Organize papers & write annotated bibliography** – document systematically (Author, Year, Topic, Theory, Method, Findings, Remarks)\n6️⃣ **Organize writing based on findings** – develop headings/subheadings, sort into categories\n7️⃣ **Produce a critique** – analyze for patterns/gaps, don't merely describe");
        }
        
        // --- Referencing and Citation ---
        if ((q.includes("referencing") || q.includes("citation") || q.includes("apa format") || q.includes("harvard referencing") || q.includes("cite") || q.includes("in-text citation"))) {
            return formatBold("**Referencing & Citation**\n\n**What to cite:** When paraphrasing, summarizing, quoting, or copying figures.\n\n**Reference vs Bibliography:** Reference list includes ONLY citations used in writing; Bibliography includes all related works.\n\n**Common formats:** APA and Harvard.\n\n**In-text citation examples (APA):**\n• Parasuraman (1991) has suggested that...\n• (Hunt, 1999; Osborn, 1998)\n• For 2 authors: Laudon and Traver (2007)\n• For 3-5 authors: first time cite all, then 'Lee et al. (2008)'\n• Same author multiple works same year: (Parasuraman, 1988a, 1988b)");
        }
        
        // --- Units of Analysis ---
        if ((q.includes("unit of analysis") || q.includes("units of analysis"))) {
            return formatBold("**Unit of Analysis** – The entities (objects or events) to be studied.\n\n**Examples:**\n• Individuals – 'What is the level of patient-perceived service quality?'\n• Dyads – 'The closer the staff-patient relationship, the higher the patient satisfaction'\n• Departments – 'What is the level of staff satisfaction for different departments?'");
        }
        
        // --- Hypotheses examples from material ---
        if ((q.includes("example of hypothesis") || q.includes("hypothesis example")) && !q.includes("format")) {
            return formatBold("**Hypothesis Examples** (from Topic 3):\n\n**H₁₀:** There is no relationship between hospital service quality and patient satisfaction.\n**H₁ₐ:** There is a significant relationship between hospital service quality and patient satisfaction.\n\n**H₂₀:** Patient's gender does not influence the relationship between hospital service quality and patient satisfaction.\n**H₂ₐ:** Patient's gender significantly influences the relationship between hospital service quality and patient satisfaction.");
        }
        
        // --- Phrases for in-text referencing ---
        if ((q.includes("phrases for referencing") || q.includes("citation phrases") || q.includes("academic phrases"))) {
            return formatBold("**Useful Phrases for In-Text Referencing**:\n\n• Tan (2018) **argues that** ...\n• As **suggested by** Trochim (2016) ...\n• Parasuraman et al. (1988) **stressed that** ...\n• Malhotra (2016) **maintains that** ...\n• James (2018) **demonstrates that** ...\n• Sekaran (2013) **has compiled** ...\n• This procedure has **received support** (Peter, 1986)\n• Kueh and Voon (2017) **quantitatively tested** ...\n• Much has been written about ... (e.g., Narver and Slater, 1990; Kohli and Jaworski, 1990)");
        }
        
        // --- Annotated bibliography ---
        if ((q.includes("annotated bibliography") || q.includes("annotated bib"))) {
            return formatBold("**Annotated Bibliography Format**:\n\n| Author (year) | Topic/problem | Theory/Model | Methodology | Findings | Remarks |\n\nThis is a tool to systematically document what has been read. Different researchers may have different formats, but capturing the key information helps motivate and remind the researcher about the research.");
        }
        
        // --- Broad purposes of research (explore, describe, examine) ---
        if ((q.includes("purposes of research") || q.includes("broad purposes") || (q.includes("explore") && q.includes("describe") && q.includes("examine")))) {
            return formatBold("**Three Broad Purposes of Research**:\n\n1. **To Explore** – become more familiar with a phenomenon, gain insights and understanding\n2. **To Describe** – describe a phenomenon or variables as complete and precise as possible\n3. **To Examine/Test** – examine and test relationships between or among variables\n\nResearch objectives should align with the purpose of the study.");
        }
        
        // --- What can a problem statement pertain to? ---
        if ((q.includes("problem statement pertain") || q.includes("types of problem statement"))) {
            return formatBold("**A problem statement can pertain to:**\n\n1. Existing problem(s) where a solution is needed to solve the 'trouble'\n2. Situation(s) that may not pose serious problems but show opportunities to tap or improvements to make\n3. Area(s) where some conceptual clarity is required\n4. Situation(s) where empirical investigations are required");
        }
        
        // --- Example problem statements from material ---
        if ((q.includes("example problem statement") || (q.includes("grace hospital") && q.includes("problem"))) || (q.includes("joyous food") && q.includes("problem"))) {
            return formatBold("**Example Problem Statement (Grace Hospital):**\n\nGrace Hospital developed 'Healthcare Service Excellence Programme' to improve service competency. However, the Hospital is experiencing a sharp increase in patient complaints encompassing a wide spectrum of issues. The Customer Service Counter has received increasing complaints; it is unknown how representative these complaints are and what implications they may have on patient satisfaction and loyalty. Management needs reliable information on the programme's effectiveness.");
        }
        
        // --- Default fallback ---
        return formatBold("**Topic 3: Developing the Approach to the Problem and Literature Review**\n\nTry asking about:\n• Problem statement\n• Research questions & research objectives\n• Independent/dependent/moderating/intervening variables\n• Hypotheses (null & alternative)\n• Theoretical framework\n• Literature review (definition, need, process, requirements)\n• Referencing and citation (APA format)\n• Units of analysis\n• Annotated bibliography\n\nJust type your question!");
    }

    // UI elements
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
        const messageWrapper = document.createElement('div');
        messageWrapper.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        
        // text already contains HTML <strong> tags from formatBold, so we don't escape it
        const formattedText = text.replace(/\n/g, '<br>');
        
        messageWrapper.innerHTML = `
            <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${formattedText}</div>
            <div class="time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
        `;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingAndRespond(questionText) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = 'msg bot-msg';
        typingWrapper.id = 'typingMsg';
        typingWrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            const typingElem = document.getElementById('typingMsg');
            if (typingElem) typingElem.remove();
            
            const answer = getTopic3Answer(questionText);
            addMessage(answer, false);
        }, 420);
    }
    
    function handleSend() {
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        
        addMessage(rawText, true);
        inputEl.value = '';
        
        showTypingAndRespond(rawText);
    }
    
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    inputEl.focus();
</script>
</body>
</html>
