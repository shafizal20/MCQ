<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Research Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .question {
      margin-bottom: 25px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }

    .question h3 {
      margin-top: 0;
      font-size: 18px;
    }

    label {
      display: block;
      margin: 8px 0;
      cursor: pointer;
    }

    input[type="radio"] {
      margin-right: 8px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
    }

    .submit-btn {
      background: #2563eb;
      color: white;
    }

    .retry-btn {
      background: #16a34a;
      color: white;
      display: none;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      background: #eefbf0;
      display: none;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .correct {
      color: green;
      font-weight: bold;
    }

    .wrong {
      color: red;
      font-weight: bold;
    }

    .feedback {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Marketing Research Quiz</h1>

    <form id="quizForm"></form>

    <button type="button" class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
    <button type="button" class="retry-btn" onclick="retryQuiz()">Retry Quiz</button>

    <div class="result" id="resultBox"></div>
  </div>

  <script>
    const quizData = [
      {
        question: "1. What are the important characteristics of a marketing research?",
        options: [
          "A) i & ii",
          "B) ii & iii",
          "C) i, ii & iii",
          "D) i, ii, iii & iv"
        ],
        answer: 3
      },
      {
        question: "2. Marketing research is important for the marketing and also other functional managers.",
        options: ["Yes", "No"],
        answer: 0
      },
      {
        question: "3. Marketing research is related to the marketing mix, customers/stakeholders, marketing environment as well as marketing decisions.",
        options: ["Yes", "No"],
        answer: 0
      },
      {
        question: "4. Which of the following variables are not included in the marketing environment (external factors)?",
        options: [
          "Economy",
          "Product",
          "Social and cultural",
          "Physical/Natural",
          "Legal and political",
          "Technology"
        ],
        answer: 1
      },
      {
        question: "5. Which of the followings is NOT the hallmark of a scientific marketing research?",
        options: [
          "A) Parsimonious",
          "B) Cheap",
          "C) Objective",
          "D) Rigorous"
        ],
        answer: 1
      },
      {
        question: "6. There are ____ major steps in the marketing research process.",
        options: [
          "A) 4",
          "B) 5",
          "C) 6",
          "D) 7"
        ],
        answer: 2
      },
      {
        question: "7. Which of the following steps is considered as the most important in the entire marketing research process?",
        options: [
          "A) Reporting",
          "B) Data analysis",
          "C) Problem identification and definition",
          "D) Research design"
        ],
        answer: 2
      },
      {
        question: "8. Arrange the various research activities, in the right sequence, for a scientific marketing research process.",
        options: [
          "A) i, ii, iii, iv, v & vi",
          "B) i, ii, iv, vi, v & iii",
          "C) i, iii, ii, iv, v & vi",
          "D) v, iv, vi, i, ii & iii"
        ],
        answer: 1
      }
    ];

    const quizForm = document.getElementById("quizForm");

    function loadQuiz() {
      quizForm.innerHTML = "";

      quizData.forEach((q, index) => {
        const qBox = document.createElement("div");
        qBox.classList.add("question");

        let html = `<h3>${q.question}</h3>`;

        q.options.forEach((option, i) => {
          html += `
            <label>
              <input type="radio" name="q${index}" value="${i}">
              ${option}
            </label>
          `;
        });

        html += `<div class="feedback" id="feedback${index}"></div>`;
        qBox.innerHTML = html;
        quizForm.appendChild(qBox);
      });
    }

    function submitQuiz() {
      let score = 0;

      quizData.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const feedback = document.getElementById(`feedback${index}`);

        if (selected) {
          if (parseInt(selected.value) === q.answer) {
            score++;
            feedback.innerHTML = `<span class="correct">Correct ✓</span>`;
          } else {
            feedback.innerHTML = `<span class="wrong">Wrong ✗</span> (Correct answer: ${q.options[q.answer]})`;
          }
        } else {
          feedback.innerHTML = `<span class="wrong">No answer selected</span> (Correct answer: ${q.options[q.answer]})`;
        }
      });

      document.getElementById("resultBox").style.display = "block";
      document.getElementById("resultBox").innerHTML = `Your Score: ${score} / ${quizData.length}`;
      document.querySelector(".retry-btn").style.display = "block";
    }

    loadQuiz();
  </script>
</body>
</html>
